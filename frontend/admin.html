<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnCurator Admin - Feedback Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .stat-card h3 {
            font-size: 2rem;
            margin-bottom: 5px;
            color: #667eea;
        }

        .stat-card p {
            color: #666;
            font-size: 0.9rem;
        }

        .refresh-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            margin-bottom: 20px;
            transition: background 0.3s;
        }

        .refresh-btn:hover {
            background: #218838;
        }

        .refresh-btn:disabled {
            background: #6c757d;
            cursor: not-allowed;
        }

        .table-container {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #333;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .rating {
            font-size: 1.2rem;
        }

        .video-link {
            color: #007bff;
            text-decoration: none;
        }

        .video-link:hover {
            text-decoration: underline;
        }

        .loading, .error {
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
        }

        .loading {
            color: #666;
        }

        .error {
            color: #dc3545;
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            border-radius: 8px;
            margin: 20px 0;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .table-container {
                overflow-x: auto;
            }

            table {
                min-width: 600px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 LearnCurator Admin Dashboard</h1>
            <p>View and manage user feedback statistics</p>
        </div>

        <button id="refreshBtn" class="refresh-btn">🔄 Refresh Data</button>

        <div id="statsContainer" class="stats-grid">
            <!-- Stats will be populated here -->
        </div>

        <div id="tableContainer" class="table-container">
            <!-- Table will be populated here -->
        </div>
    </div>

    <script>
        // Configuration
        const CONFIG = {
            API_BASE_URL: 'http://localhost:3001', // Update this to your production backend URL
            FEEDBACK_STATS_TOKEN: 'RfOyJbqyvVcA6xWF' // This token is protected by Netlify password protection
        };

        // DOM Elements
        const refreshBtn = document.getElementById('refreshBtn');
        const statsContainer = document.getElementById('statsContainer');
        const tableContainer = document.getElementById('tableContainer');

        // Initialize
        document.addEventListener('DOMContentLoaded', loadFeedbackData);
        refreshBtn.addEventListener('click', loadFeedbackData);

        async function loadFeedbackData() {
            refreshBtn.disabled = true;
            refreshBtn.textContent = '⏳ Loading...';

            try {
                const response = await fetch(`${CONFIG.API_BASE_URL}/api/feedback/stats`, {
                    headers: {
                        'x-admin-token': CONFIG.FEEDBACK_STATS_TOKEN
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();

                if (!data.success) {
                    throw new Error(data.error || 'Unknown error');
                }

                renderStats(data);
                renderTable(data.recentFeedback || []);

            } catch (error) {
                console.error('Failed to load feedback data:', error);
                showError(`Failed to load data: ${error.message}`);
            } finally {
                refreshBtn.disabled = false;
                refreshBtn.textContent = '🔄 Refresh Data';
            }
        }

        function renderStats(data) {
            const totalFeedback = data.totalFeedback || 0;
            const breakdown = data.breakdown || { '1': 0, '2': 0, '3': 0 };
            const averageRating = totalFeedback > 0 ?
                (breakdown['1'] * 1 + breakdown['2'] * 2 + breakdown['3'] * 3) / totalFeedback : 0;

            statsContainer.innerHTML = `
                <div class="stat-card">
                    <h3>${totalFeedback}</h3>
                    <p>Total Feedback</p>
                </div>
                <div class="stat-card">
                    <h3>${averageRating.toFixed(1)}</h3>
                    <p>Average Rating</p>
                </div>
                <div class="stat-card">
                    <h3>${breakdown['3']}</h3>
                    <p>😍 Ratings</p>
                </div>
                <div class="stat-card">
                    <h3>${breakdown['2']}</h3>
                    <p>😐 Ratings</p>
                </div>
                <div class="stat-card">
                    <h3>${breakdown['1']}</h3>
                    <p>😞 Ratings</p>
                </div>
            `;
        }

        function renderTable(feedback) {
            if (!feedback || feedback.length === 0) {
                tableContainer.innerHTML = '<div class="no-data">No feedback data available</div>';
                return;
            }

            const tableHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Video</th>
                            <th>Rating</th>
                            <th>Comment</th>
                            <th>Search Query</th>
                            <th>IP</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${feedback.map(item => `
                            <tr>
                                <td>${formatDate(item.created_at)}</td>
                                <td><a href="https://www.youtube.com/watch?v=${item.video_id}" class="video-link" target="_blank">${item.video_id}</a></td>
                                <td class="rating">${getRatingEmoji(item.rating_value)} ${item.rating_value}</td>
                                <td>${item.comment || '-'}</td>
                                <td>${item.search_query || '-'}</td>
                                <td>${truncateIP(item.user_ip)}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;

            tableContainer.innerHTML = tableHTML;
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }

        function getRatingEmoji(rating) {
            switch (rating) {
                case 1: return '😞';
                case 2: return '😐';
                case 3: return '😍';
                default: return '❓';
            }
        }

        function truncateIP(ip) {
            if (!ip) return '-';
            const parts = ip.split('.');
            return parts.length >= 2 ? `${parts[0]}.${parts[1]}.*.*` : ip;
        }

        function showError(message) {
            statsContainer.innerHTML = '';
            tableContainer.innerHTML = `<div class="error">${message}</div>`;
        }
    </script>
</body>
</html>
