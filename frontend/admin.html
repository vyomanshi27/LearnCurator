<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnCurator Admin - Feedback Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .stat-card h3 {
            font-size: 2rem;
            margin-bottom: 5px;
            color: #667eea;
        }

        .stat-card p {
            color: #666;
            font-size: 0.9rem;
        }

        .refresh-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            margin-bottom: 20px;
            transition: background 0.3s;
        }

        .refresh-btn:hover {
            background: #218838;
        }

        .refresh-btn:disabled {
            background: #6c757d;
            cursor: not-allowed;
        }

        .table-container {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #333;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .rating {
            font-size: 1.2rem;
        }

        .video-link {
            color: #007bff;
            text-decoration: none;
        }

        .video-link:hover {
            text-decoration: underline;
        }

        .loading, .error {
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
        }

        .loading {
            color: #666;
        }

        .error {
            color: #dc3545;
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            border-radius: 8px;
            margin: 20px 0;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .login-panel {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 30px;
            max-width: 480px;
            margin: 0 auto 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
            text-align: center;
        }

        .login-panel h2 {
            margin-bottom: 12px;
            color: #333;
        }

        .login-panel p {
            margin-bottom: 20px;
            color: #555;
        }

        .login-panel input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 14px;
            border: 1px solid #d7dfe9;
            border-radius: 10px;
            font-size: 1rem;
        }

        .button-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .refresh-btn.logout {
            background: #dc3545;
        }

        .refresh-btn.logout:hover {
            background: #c82333;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .table-container {
                overflow-x: auto;
            }

            table {
                min-width: 600px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 LearnCurator Admin Dashboard</h1>
            <p>Owner access for feedback monitoring</p>
        </div>

        <div id="loginContainer" class="login-panel">
            <h2>Admin login</h2>
            <p>Enter your password to access the dashboard.</p>
            <input id="adminPasswordInput" type="password" placeholder="Admin password" />
            <button id="loginBtn" class="refresh-btn">🔐 Login</button>
            <div id="loginError" class="error hidden"></div>
        </div>

        <div id="dashboard" class="hidden">
            <div class="button-row">
                <button id="refreshBtn" class="refresh-btn">🔄 Refresh Data</button>
                <button id="logoutBtn" class="refresh-btn logout">🚪 Logout</button>
            </div>

            <div id="statsContainer" class="stats-grid"></div>
            <div id="tableContainer" class="table-container"></div>
        </div>
    </div>

    <script>
        const CONFIG = {
            API_BASE_URL: '/.netlify/functions/search'
        };

        const loginContainer = document.getElementById('loginContainer');
        const dashboard = document.getElementById('dashboard');
        const adminPasswordInput = document.getElementById('adminPasswordInput');
        const loginBtn = document.getElementById('loginBtn');
        const loginError = document.getElementById('loginError');
        const refreshBtn = document.getElementById('refreshBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const statsContainer = document.getElementById('statsContainer');
        const tableContainer = document.getElementById('tableContainer');

        document.addEventListener('DOMContentLoaded', () => {
            loginBtn.addEventListener('click', handleLogin);
            refreshBtn.addEventListener('click', loadFeedbackData);
            logoutBtn.addEventListener('click', handleLogout);
        });

        async function handleLogin() {
            loginError.classList.add('hidden');
            loginError.textContent = '';

            const password = adminPasswordInput.value.trim();
            if (!password) {
                showLoginError('Please enter your admin password.');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = '🔐 Logging in...';

            try {
                const response = await fetch(`${CONFIG.API_BASE_URL}/api/admin/login`, {
                    method: 'POST',
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ password })
                });

                const data = await response.json();

                if (!response.ok || !data.success) {
                    throw new Error(data.error || 'Login failed');
                }

                adminPasswordInput.value = '';
                showDashboard();
                loadFeedbackData();
            } catch (error) {
                showLoginError(error.message || 'Unable to login');
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = '🔐 Login';
            }
        }

        async function handleLogout() {
            logoutBtn.disabled = true;
            logoutBtn.textContent = '🚪 Logging out...';

            try {
                await fetch(`${CONFIG.API_BASE_URL}/api/admin/logout`, {
                    method: 'POST',
                    credentials: 'include'
                });
            } catch (error) {
                console.warn('Logout error', error);
            }

            hideDashboard();
        }

        function showLoginError(message) {
            loginError.textContent = message;
            loginError.classList.remove('hidden');
        }

        function showDashboard() {
            loginContainer.classList.add('hidden');
            dashboard.classList.remove('hidden');
        }

        function hideDashboard() {
            loginContainer.classList.remove('hidden');
            dashboard.classList.add('hidden');
            statsContainer.innerHTML = '';
            tableContainer.innerHTML = '';
        }

        async function loadFeedbackData() {
            refreshBtn.disabled = true;
            refreshBtn.textContent = '⏳ Loading...';

            try {
                const response = await fetch(`${CONFIG.API_BASE_URL}/api/admin/feedback-stats`, {
                    credentials: 'include'
                });

                if (!response.ok) {
                    if (response.status === 401) {
                        hideDashboard();
                        throw new Error('Unauthorized. Please log in again.');
                    }
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                if (!data.success) {
                    throw new Error(data.error || 'Unknown error');
                }

                renderStats(data);
                renderTable(data.recentFeedback || []);
            } catch (error) {
                showError(`Failed to load data: ${error.message}`);
            } finally {
                refreshBtn.disabled = false;
                refreshBtn.textContent = '🔄 Refresh Data';
            }
        }

        function renderStats(data) {
            const totalFeedback = data.totalFeedback || 0;
            const breakdown = data.breakdown || { '1': 0, '2': 0, '3': 0 };
            const averageRating = totalFeedback > 0 ?
                (breakdown['1'] * 1 + breakdown['2'] * 2 + breakdown['3'] * 3) / totalFeedback : 0;

            statsContainer.innerHTML = `
                <div class="stat-card">
                    <h3>${totalFeedback}</h3>
                    <p>Total Feedback</p>
                </div>
                <div class="stat-card">
                    <h3>${averageRating.toFixed(1)}</h3>
                    <p>Average Rating</p>
                </div>
                <div class="stat-card">
                    <h3>${breakdown['3']}</h3>
                    <p>😍 Ratings</p>
                </div>
                <div class="stat-card">
                    <h3>${breakdown['2']}</h3>
                    <p>😐 Ratings</p>
                </div>
                <div class="stat-card">
                    <h3>${breakdown['1']}</h3>
                    <p>😞 Ratings</p>
                </div>
            `;
        }

        function renderTable(feedback) {
            if (!feedback || feedback.length === 0) {
                tableContainer.innerHTML = '<div class="no-data">No feedback data available</div>';
                return;
            }

            const tableHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Video</th>
                            <th>Rating</th>
                            <th>Comment</th>
                            <th>Search Query</th>
                            <th>IP</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${feedback.map(item => `
                            <tr>
                                <td>${formatDate(item.created_at)}</td>
                                <td><a href="https://www.youtube.com/watch?v=${item.video_id}" class="video-link" target="_blank">${item.video_id}</a></td>
                                <td class="rating">${getRatingEmoji(item.rating_value)} ${item.rating_value}</td>
                                <td>${item.comment || '-'}</td>
                                <td>${item.search_query || '-'}</td>
                                <td>${truncateIP(item.user_ip)}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;

            tableContainer.innerHTML = tableHTML;
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }

        function getRatingEmoji(rating) {
            switch (rating) {
                case 1: return '😞';
                case 2: return '😐';
                case 3: return '😍';
                default: return '❓';
            }
        }

        function truncateIP(ip) {
            if (!ip) return '-';
            const parts = ip.split('.');
            return parts.length >= 2 ? `${parts[0]}.${parts[1]}.*.*` : ip;
        }

        function showError(message) {
            statsContainer.innerHTML = '';
            tableContainer.innerHTML = `<div class="error">${message}</div>`;
        }
    </script>
</body>
</html>
